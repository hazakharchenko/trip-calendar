  };

  const firebaseConfig = {
    apiKey:            "AIzaSyAY21iSHriFw8h3vZYOlC5bxFeJEn359cs",
    authDomain:        "petroshike.firebaseapp.com",
    databaseURL:       "https://petroshike-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "petroshike",
    storageBucket:     "petroshike.firebasestorage.app",
    messagingSenderId: "596257935951",
    appId:             "1:596257935951:web:229128c64605545084d03a"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  /* ── shared state ── */
  let currentUser  = null;
  let activeSticker= null;
  let activeColor  = null;
  let rangeStart   = null;
  let currentMonth = 5;
  let marks        = {};          // local mirror of Firebase data
  let knownUsers   = JSON.parse(localStorage.getItem('trip_users') || '[]');

  /* ── listen to ALL marks in real time ── */
  onValue(ref(db, 'marks'), snapshot => {
    marks = snapshot.val() || {};
    if (currentUser) renderCalendar(currentMonth);
  });

  /* ── helpers ── */
  const k   = (y,m,d) => `${y}-${m}-${d}`;
  const dow = (y,m,d) => { const v = new Date(y,m,d).getDay(); return v===0?6:v-1; };
  const dim = (y,m)   => new Date(y,m+1,0).getDate();

  function isMine(y,m,d){
    const day = marks[k(y,m,d)];
    return day && Object.values(day).some(x => x.user === currentUser);
  }

  /* each mark stored at marks/{dateKey}/{userName} */
  function removeMe(y,m,d){
    remove(ref(db, `marks/${k(y,m,d)}/${currentUser}`));
  }
  function addMe(y,m,d){
    set(ref(db, `marks/${k(y,m,d)}/${currentUser}`), {
      user:  currentUser,
      color: activeColor,
      type:  activeSticker
    });
  }

  /* ── calendar render ── */
  const DAYS   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MONTHS = [{m:5,y:2026},{m:6,y:2026},{m:7,y:2026}];

  function fillStickers(wrap, y, m, d){
    if (!wrap) return;
    wrap.innerHTML = '';
    const day = marks[k(y,m,d)];
    if (!day) return;
    Object.values(day).forEach(mk => {
      const s = document.createElement('img');
      s.className = 'placed-sticker-img';
      s.src = STICKER_IMGS[mk.type];
      s.setAttribute('data-name', mk.user);
      s.alt = mk.type;
      s.addEventListener('mouseenter', ev => {
        const tt = document.getElementById('tooltip');
        tt.textContent = mk.user;
        tt.style.display = 'block';
        tt.style.left = (ev.clientX + 12) + 'px';
        tt.style.top = (ev.clientY - 28) + 'px';
      });
      s.addEventListener('mousemove', ev => {
        const tt = document.getElementById('tooltip');
        tt.style.left = (ev.clientX + 12) + 'px';
        tt.style.top = (ev.clientY - 28) + 'px';
      });
      s.addEventListener('mouseleave', () => {
        document.getElementById('tooltip').style.display = 'none';
      });
      wrap.appendChild(s);
    });
  }

  function renderCalendar(mi){
    const mo  = MONTHS.find(x => x.m === mi);
    const hdr = document.getElementById('cal-headers');
    const grid= document.getElementById('cal-grid');
    hdr.innerHTML = ''; grid.innerHTML = '';
    DAYS.forEach(d => {
      const e = document.createElement('div'); e.className='cal-header'; e.textContent=d; hdr.appendChild(e);
    });
    const fd = dow(mo.y, mo.m, 1);
    for (let i=0; i<fd; i++){
      const e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e);
    }
    for (let d=1; d<=dim(mo.y,mo.m); d++){
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.dataset.day   = d;
      el.dataset.month = mo.m;
      el.dataset.year  = mo.y;
      const num = document.createElement('div'); num.className='day-num'; num.textContent=d; el.appendChild(num);
      const sw  = document.createElement('div'); sw.className='stickers-wrap'; el.appendChild(sw);
      fillStickers(sw, mo.y, mo.m, d);
      el.addEventListener('click',   onDayClick);
      el.addEventListener('mouseenter', onEnter);
      el.addEventListener('mouseleave', () => { hoverEl = null; });
      grid.appendChild(el);
    }
  }

  function clearRange(){ document.querySelectorAll('.cal-day.in-range').forEach(e=>e.classList.remove('in-range')); }

  function onDayClick(e){
    if (!currentUser) return;
    const el = e.currentTarget;
    const d=+el.dataset.day, m=+el.dataset.month, y=+el.dataset.year;
    if (isMine(y,m,d) && !rangeStart){ removeMe(y,m,d); return; }
    if (!activeSticker) return;
    if (rangeStart){
      const s = rangeStart; rangeStart = null; clearRange();
      const a = new Date(Math.min(+new Date(s.y,s.m,s.d), +new Date(y,m,d)));
      const b = new Date(Math.max(+new Date(s.y,s.m,s.d), +new Date(y,m,d)));
      for (const cur=new Date(a); cur<=b; cur.setDate(cur.getDate()+1))
        addMe(cur.getFullYear(), cur.getMonth(), cur.getDate());
    } else {
      rangeStart = {y,m,d};
      addMe(y,m,d);
    }
  }

  let hoverEl = null;
  function onEnter(e){
    hoverEl = e.currentTarget;
    if (!rangeStart) return;
    const d=+hoverEl.dataset.day, m=+hoverEl.dataset.month, y=+hoverEl.dataset.year;
    clearRange();
    const a = new Date(Math.min(+new Date(rangeStart.y,rangeStart.m,rangeStart.d), +new Date(y,m,d)));
    const b = new Date(Math.max(+new Date(rangeStart.y,rangeStart.m,rangeStart.d), +new Date(y,m,d)));
    document.querySelectorAll('#cal-grid .cal-day:not(.empty)').forEach(el => {
      const ed = new Date(+el.dataset.year, +el.dataset.month, +el.dataset.day);
      if (ed>=a && ed<=b) el.classList.add('in-range');
    });
  }

  document.addEventListener('mousemove', e => {
    const cd=document.getElementById('cursor-dot'), tt=document.getElementById('tooltip');
    const onSticker = e.target.classList.contains('placed-sticker-img');
    if (activeSticker){
      cd.style.display='block'; cd.style.left=e.clientX+'px'; cd.style.top=e.clientY+'px';
      if (hoverEl && !hoverEl.classList.contains('empty')){
        tt.style.display='block'; tt.textContent=currentUser||'';
        tt.style.left=(e.clientX+16)+'px'; tt.style.top=(e.clientY-28)+'px';
      } else if(!onSticker){ tt.style.display='none'; }
    } else {
      cd.style.display='none';
      if(!onSticker) tt.style.display='none';
    }
  });

  function deactivate(){
    activeSticker=null; activeColor=null; rangeStart=null; clearRange();
    document.getElementById('cursor-dot').style.display='none';
    document.getElementById('tooltip').style.display='none';
    document.querySelectorAll('.big-sticker').forEach(x=>x.classList.remove('active'));
  }
  document.addEventListener('keydown', e => { if (e.key==='Escape') deactivate(); });

  document.querySelectorAll('.big-sticker').forEach(el => {
    el.onclick = () => {
      const t=el.dataset.type, c=el.dataset.color;
      if (activeSticker===t){ deactivate(); }
      else {
        activeSticker=t; activeColor=c; rangeStart=null;
        const cd=document.getElementById('cursor-dot');
        document.getElementById('cursor-dot-img').src=STICKER_IMGS[t];
        document.querySelectorAll('.big-sticker').forEach(x=>x.classList.remove('active'));
        el.classList.add('active');
      }
    };
  });

  document.querySelectorAll('.month-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active'); rangeStart=null; clearRange();
      currentMonth=+tab.dataset.month; renderCalendar(currentMonth);
    };
  });

  /* ── popup ── */
  function buildPopup(){
    const chips=document.getElementById('name-chips');
    chips.innerHTML='';
    if (!knownUsers.length){ chips.style.display='none'; return; }
    chips.style.display='flex';
    knownUsers.forEach(u => {
      const c=document.createElement('div'); c.className='chip'; c.textContent=u;
      c.onclick=()=>{ document.querySelectorAll('#name-chips .chip').forEach(x=>x.classList.remove('selected')); c.classList.add('selected'); document.getElementById('name-input').value=''; };
      chips.appendChild(c);
    });
  }
  buildPopup();

  document.getElementById('continue-btn').onclick = () => {
    const sel   = document.querySelector('#name-chips .chip.selected');
    const typed = document.getElementById('name-input').value.trim();
    const name  = (typed||(sel?sel.textContent:'')).trim();
    if (!name) return;
    currentUser = name;
    if (!knownUsers.includes(name)) knownUsers.push(name);
    localStorage.setItem('trip_users', JSON.stringify(knownUsers));
    document.getElementById('overlay').style.display='none';
    document.getElementById('user-badge').style.display='inline-flex';
    document.getElementById('active-user-name').textContent=name;
    renderCalendar(currentMonth);
  };
  document.getElementById('name-input').addEventListener('input', () =>
    document.querySelectorAll('#name-chips .chip').forEach(x=>x.classList.remove('selected')));
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key==='Enter') document.getElementById('continue-btn').click();
  });
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#F5F4F0;color:#1A1A1A;min-height:100vh}

  .page-header{background:#fff;border-bottom:1px solid #E8E6E0;padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
  .page-title{font-size:17px;font-weight:600;color:#1A1A1A;letter-spacing:-0.02em}
  .page-sub{font-size:13px;color:#888;margin-top:2px}
  .user-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;background:#F5F4F0;border:1px solid #E8E6E0;font-size:13px;font-weight:500;color:#1A1A1A}
  .user-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0}

  .page-body{max-width:980px;margin:0 auto;padding:32px 24px}

  .month-tabs{display:flex;gap:8px;margin-bottom:24px}
  .month-tab{padding:9px 22px;border-radius:8px;border:1px solid #E8E6E0;font-size:14px;font-weight:500;cursor:pointer;background:#fff;color:#888;transition:all 0.15s}
  .month-tab:hover{border-color:#C8C6C0;color:#1A1A1A}
  .month-tab.active{background:#1A1A1A;color:#fff;border-color:#1A1A1A}

  .cal-wrap{background:#fff;border:1px solid #E8E6E0;border-radius:12px;overflow:hidden}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-header{text-align:center;font-size:12px;font-weight:600;color:#888;padding:12px 4px;letter-spacing:0.04em;text-transform:uppercase;border-bottom:1px solid #E8E6E0;background:#FAFAF8}
  .cal-day{min-height:80px;border-right:1px solid #F0EEE8;border-bottom:1px solid #F0EEE8;padding:8px;cursor:pointer;position:relative;transition:background 0.1s;overflow:hidden}
  .cal-day:nth-child(7n){border-right:none}
  .cal-day:hover{background:#FAFAF8}
  .cal-day.empty{background:transparent;cursor:default}
  .cal-day.empty:hover{background:transparent}
  .cal-day.in-range{background:#F5F4F0}
  .day-num{font-size:13px;font-weight:500;color:#AAAAAA;margin-bottom:6px;user-select:none;pointer-events:none}
  .stickers-wrap{display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start}
  .placed-sticker{width:22px;height:22px;border-radius:50%;flex-shrink:0;position:relative}
  .placed-sticker[data-name]:hover::after{content:attr(data-name);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;font-size:11px;font-family:'Inter',sans-serif;padding:3px 8px;border-radius:5px;white-space:nowrap;z-index:10;pointer-events:none}

  .sticker-section{margin-top:24px;background:#fff;border:1px solid #E8E6E0;border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:40px}
  .sticker-label{font-size:13px;color:#888;font-weight:500;white-space:nowrap;flex-shrink:0}
  .sticker-options{display:flex;gap:16px;flex:1}
  .big-sticker{display:flex;align-items:center;gap:10px;padding:10px 18px;border-radius:8px;border:1.5px solid #E8E6E0;cursor:pointer;background:#fff;transition:all 0.15s;user-select:none}
  .big-sticker:hover{border-color:#C8C6C0;background:#FAFAF8}
  .big-sticker.active{border-color:#1A1A1A;background:#F5F4F0}
  .big-sticker .dot{width:20px;height:20px;border-radius:50%;flex-shrink:0}
  .big-sticker .dot.green{background:#4CAF50}
  .big-sticker .dot.yellow{background:#FFC107}
  .big-sticker .dot.red{background:#F44336}
  .big-sticker .label{font-size:13px;font-weight:500;color:#1A1A1A}
  .hint{font-size:12px;color:#BBBBBB;text-align:right;line-height:1.5;flex-shrink:0}


  .sticker-img{width:28px;height:28px;object-fit:contain;flex-shrink:0}
  .placed-sticker-img{width:24px;height:24px;object-fit:contain;flex-shrink:0;position:relative;display:inline-block;cursor:default}
  .placed-sticker-img[data-name]:hover::after{content:attr(data-name);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;font-size:11px;font-family:'Inter',sans-serif;padding:3px 8px;border-radius:5px;white-space:nowrap;z-index:10;pointer-events:none}

  #cursor-dot{position:fixed;pointer-events:none;width:44px;height:44px;z-index:999;transform:translate(-50%,-50%);display:none}
  #tooltip{position:fixed;pointer-events:none;background:#1A1A1A;color:#fff;font-size:12px;font-family:'Inter',sans-serif;padding:4px 9px;border-radius:6px;z-index:1000;display:none;white-space:nowrap}

  #overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
  #popup{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.15);padding:32px;width:380px}
  #popup h2{font-size:20px;font-weight:600;color:#1A1A1A;margin-bottom:6px;letter-spacing:-0.02em}
  #popup p{font-size:14px;color:#888;margin-bottom:20px;line-height:1.5}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{padding:7px 16px;border-radius:20px;border:1px solid #E8E6E0;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#1A1A1A;transition:all 0.15s;font-family:'Inter',sans-serif}
  .chip:hover{border-color:#C8C6C0;background:#F5F4F0}
  .chip.selected{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
  #name-input{width:100%;padding:10px 14px;border:1px solid #E8E6E0;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;background:#fff;color:#1A1A1A;margin-bottom:16px;outline:none;transition:border-color 0.15s}
  #name-input:focus{border-color:#1A1A1A}
  #name-input::placeholder{color:#BBBBBB}
  #continue-btn{width:100%;padding:11px;background:#1A1A1A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:-0.01em;transition:opacity 0.15s}
  #continue-btn:hover{opacity:0.85}
</style>
</head>
